name: Movie Review Bot

on:
  schedule:
    # Run twice a week: Wednesday and Sunday at 10:00 AM UTC
    - cron: '0 10 * * 3,0'
  workflow_dispatch:  # Allow manual trigger

jobs:
  create-review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Movie Review Bot
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          OMDB_API_KEY: ${{ secrets.OMDB_API_KEY }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          CHANNEL_LANGUAGE: ${{ secrets.CHANNEL_LANGUAGE || 'vi' }}
          CHANNEL_NAME: ${{ secrets.CHANNEL_NAME || 'PhimHay Review' }}
        run: |
          # Create client_secret.json from secret
          echo "$YOUTUBE_CLIENT_SECRET" > client_secret.json

          # Run the bot
          python pipeline.py --trending --count 1 --upload --privacy public

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: movie-review-output
          path: |
            output/videos/
            output/audio/
            output/thumbnails/
            output/subtitles/
          retention-days: 7
